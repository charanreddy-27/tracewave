# Scrape Tracewave's own pipeline health — observability OF the observability tool.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: tracewave-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels: { service: api }

  - job_name: tracewave-ingestor
    static_configs:
      - targets: ["ingestor:9100"]
        labels: { service: ingestor }

  - job_name: tracewave-processor
    static_configs:
      - targets: ["processor:9100"]
        labels: { service: processor }
