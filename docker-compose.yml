# Tracewave — full distributed stack.
#   make up   (or: docker compose up --build)
#
# Topology: ingestor -> Redis Streams -> processor -> TimescaleDB + Redis pub/sub
#           -> API (WS) -> web dashboard. Prometheus + Grafana watch the pipeline's
#           own health.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [tracewave]

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: tracewave
      POSTGRES_PASSWORD: tracewave
      POSTGRES_DB: tracewave
    volumes:
      - tsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracewave -d tracewave"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [tracewave]

  ingestor:
    build: ./backend
    command: ["python", "-m", "tracewave.run.ingestor"]
    environment:
      TW_REDIS_URL: redis://redis:6379/0
      TW_USER_AGENT: ${TW_USER_AGENT:-Tracewave/0.1 (demo; https://github.com/tracewave/tracewave)}
      TW_METRICS_PORT: "9100"
      TW_SOURCE: ${TW_SOURCE:-wikimedia}
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    networks: [tracewave]

  processor:
    build: ./backend
    command: ["python", "-m", "tracewave.run.processor"]
    environment:
      TW_REDIS_URL: redis://redis:6379/0
      TW_PG_DSN: postgresql://tracewave:tracewave@timescaledb:5432/tracewave
      TW_METRICS_PORT: "9100"
    depends_on:
      redis: { condition: service_healthy }
      timescaledb: { condition: service_healthy }
    restart: unless-stopped
    networks: [tracewave]

  api:
    build: ./backend
    environment:
      TW_REDIS_URL: redis://redis:6379/0
      TW_PG_DSN: postgresql://tracewave:tracewave@timescaledb:5432/tracewave
      TW_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      redis: { condition: service_healthy }
      timescaledb: { condition: service_healthy }
    restart: unless-stopped
    networks: [tracewave]

  web:
    build:
      context: ./frontend
      args:
        # Inlined into the client bundle at build time. Browser hits the API on the host.
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    environment:
      # Runtime: REST is proxied server-side to the api container.
      BACKEND_ORIGIN: http://api:8000
    ports:
      - "3000:3000"
    depends_on: [api]
    restart: unless-stopped
    networks: [tracewave]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on: [api]
    networks: [tracewave]

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [tracewave]

volumes:
  tsdata:

networks:
  tracewave:
    driver: bridge
